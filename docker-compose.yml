services:
  postgres:
    image: postgres:15-alpine
    container_name: xiaomiev-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-you_password}
      POSTGRES_DB: xiaomi_ev
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  xiaomiev-mate:
    container_name: xiaomiev-mate
    image: ponyix/xioamiev-mate:backend-last
    volumes:
      - ./logs:/var/log/xiaomiev
    environment:
      - TZ=Asia/Shanghai
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/xiaomi_ev?stringtype=unspecified
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-you_password}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  xiaomiev-mate-web:
    container_name: xiaomiev-mate-web
    image: ponyix/xioamiev-mate:web-last
    ports:
      - "18080:80"
    restart: always
    depends_on:
      - xiaomiev-mate
